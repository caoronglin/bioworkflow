# Release Pipeline - Publish to PyPI and GitHub Releases
# Triggered on version tags (v*)
#
# Reference:
# - Maturin publish: https://www.maturin.rs/distribution
# - GitHub Releases: https://github.com/softprops/action-gh-release

name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write  # for creating releases
  id-token: write  # for OIDC PyPI publishing

env:
  PYTHON_VERSION: '3.12'

jobs:
  # ============================================
  # BUILD - Create distribution artifacts
  # ============================================
  
  build-linux:
    name: Build Linux Wheels
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        target: [x86_64, aarch64]
    
    steps:
      - uses: actions/checkout@v6
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      
      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          args: --release --out dist
          manylinux: auto
      
      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: wheels-linux-${{ matrix.target }}
          path: dist/

  build-macos:
    name: Build macOS Wheels
    runs-on: macos-latest
    
    strategy:
      matrix:
        target: [x86_64, aarch64]
    
    steps:
      - uses: actions/checkout@v6
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      
      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}-apple-darwin
          args: --release --out dist
      
      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: wheels-macos-${{ matrix.target }}
          path: dist/

  build-windows:
    name: Build Windows Wheels
    runs-on: windows-latest
    
    strategy:
      matrix:
        target: [x64]
    
    steps:
      - uses: actions/checkout@v6
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          architecture: ${{ matrix.target }}
      
      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          args: --release --out dist
      
      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: wheels-windows-${{ matrix.target }}
          path: dist/

  build-sdist:
    name: Build Source Distribution
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v6
      
      - name: Build sdist
        uses: PyO3/maturin-action@v1
        with:
          command: sdist
          args: --out dist
      
      - name: Upload sdist
        uses: actions/upload-artifact@v4
        with:
          name: wheels-sdist
          path: dist/

  # ============================================
  # PUBLISH - PyPI and GitHub Releases
  # ============================================
  
  publish-pypi:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: [build-linux, build-macos, build-windows, build-sdist]
    
    environment:
      name: pypi
      url: https://pypi.org/project/${{ github.event.repository.name }}/
    
    steps:
      - name: Download all wheels
        uses: actions/download-artifact@v4
        with:
          pattern: wheels-*
          path: dist/
          merge-multiple: true
      
      - name: Publish to PyPI
        uses: PyO3/maturin-action@v1
        with:
          command: upload
          args: --non-interactive --skip-existing dist/*
        env:
          MATURIN_PYPI_TOKEN: ${{ secrets.PYPI_API_TOKEN }}

  create-github-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [publish-pypi]
    
    steps:
      - uses: actions/checkout@v6
      
      - name: Download all wheels
        uses: actions/download-artifact@v4
        with:
          pattern: wheels-*
          path: dist/
          merge-multiple: true
      
      - name: Extract changelog
        id: changelog
        run: |
          # Extract version from tag
          VERSION=${GITHUB_REF#refs/tags/v}
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          
          # Extract changelog section for this version
          if [ -f CHANGELOG.md ]; then
            # Extract content between version headers
            sed -n "/## \[$VERSION\]/,/## \[/p" CHANGELOG.md | head -n -1 > release_notes.md
          else
            echo "Release version $VERSION" > release_notes.md
          fi
      
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: release_notes.md
          files: dist/*
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref, '-rc') || contains(github.ref, '-beta') || contains(github.ref, '-alpha') }}