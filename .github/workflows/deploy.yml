# Deployment Pipeline for Production and Staging
# Triggered manually or on push to main branch
#
# Reference:
# - Vercel deployment: https://vercel.com/docs/git/vercel-for-github
# - Docker multi-platform: https://docs.docker.com/build/building/multi-platform/

name: Deploy

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production

# Only one deployment per environment at a time
concurrency:
  group: deploy-${{ github.event.inputs.environment || 'staging' }}
  cancel-in-progress: false

env:
  PYTHON_VERSION: '3.12'
  NODE_VERSION: '22'
  PNPM_VERSION: '10'
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ============================================
  # BUILD - Create artifacts
  # ============================================
  
  build-wheels:
    name: Build Python Wheels
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    
    steps:
      - uses: actions/checkout@v6
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      
      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          args: --release --out dist
          manylinux: auto
      
      - name: Build sdist
        uses: PyO3/maturin-action@v1
        with:
          command: sdist
          args: --out dist
      
      - name: Extract version
        id: version
        run: echo "version=$(python -c 'import tomllib; print(tomllib.load(open("pyproject.toml", "rb"))["project"]["version"])')" >> $GITHUB_OUTPUT
      
      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: wheels-dist
          path: dist/

  build-frontend:
    name: Build Frontend
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v6
      
      - name: Setup pnpm
        uses: pnpm/action-setup@v5
        with:
          version: ${{ env.PNPM_VERSION }}
      
      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
          cache-dependency-path: 'src/frontend/pnpm-lock.yaml'
      
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        working-directory: src/frontend/
      
      - name: Build
        run: pnpm build
        working-directory: src/frontend/
        env:
          NODE_ENV: production
          VITE_API_URL: ${{ vars.API_URL }}
      
      - name: Upload build
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: src/frontend/dist/

  # ============================================
  # DOCKER - Multi-platform image build
  # ============================================
  
  docker-push:
    name: Push Docker Image
    runs-on: ubuntu-latest
    needs: [build-wheels, build-frontend]
    
    permissions:
      contents: read
      packages: write
      id-token: write  # for OIDC
    
    steps:
      - uses: actions/checkout@v6
      
      - name: Download wheels
        uses: actions/download-artifact@v4
        with:
          name: wheels-dist
          path: dist/
      
      - name: Download frontend
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: src/frontend/dist/
      
      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha
      
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false
          sbom: false

  # ============================================
  # VERCEL - Frontend deployment
  # ============================================
  
  deploy-vercel-preview:
    name: Deploy Preview to Vercel
    runs-on: ubuntu-latest
    needs: [build-frontend]
    if: github.event_name == 'pull_request'
    
    steps:
      - uses: actions/checkout@v6
      
      - name: Download frontend
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: src/frontend/dist/
      
      - name: Deploy to Vercel
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          working-directory: src/frontend/dist/

  deploy-vercel-production:
    name: Deploy Production to Vercel
    runs-on: ubuntu-latest
    needs: [build-frontend]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    environment:
      name: production
      url: ${{ steps.deploy.outputs.url }}
    
    steps:
      - uses: actions/checkout@v6
      
      - name: Download frontend
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: src/frontend/dist/
      
      - name: Deploy to Vercel
        id: deploy
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          vercel-args: '--prod'
          working-directory: src/frontend/dist/

  # ============================================
  # NOTIFY - Status updates
  # ============================================
  
  notify-success:
    name: Notify Success
    runs-on: ubuntu-latest
    needs: [docker-push, deploy-vercel-production]
    if: success() && github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    steps:
      - name: Send notification
        uses: 8398a7/action-slack@v3
        with:
          status: success
          fields: repo,message,commit,author,action,eventName,ref,workflow
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK }}