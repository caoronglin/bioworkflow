name: Performance Benchmarks

on:
  push:
    branches: [main, develop]
    paths:
      - 'src/**'
      - 'rust/**'
      - 'tests/**'
      - '.github/workflows/benchmark.yml'
  pull_request:
    branches: [main, develop]
    paths:
      - 'src/**'
      - 'rust/**'
      - 'tests/**'
  workflow_dispatch:  # Manual trigger

permissions:
  contents: write
  deployments: write

env:
  CARGO_TERM_COLOR: always

jobs:
  # ==================== Python 性能测试 ====================
  python-benchmark:
    name: Python Benchmarks
    runs-on: ubuntu-latest

    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: --health-cmd "redis-cli ping" --health-interval 10s --health-timeout 5s --health-retries 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust -> target

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: pyproject.toml

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install maturin[patchelf]
          pip install -e ".[dev]"
          pip install pytest-benchmark pytest-json-report

      - name: Build Rust extension
        run: |
          cd rust
          maturin develop --release

      - name: Run Python benchmarks
        run: |
          pytest tests/ \
            -v \
            -m benchmark \
            --benchmark-only \
            --benchmark-json=benchmark-results.json \
            --benchmark-autosave \
            --benchmark-compare \
            --benchmark-compare-fail=mean:20%
        env:
          DATABASE_URL: sqlite+aiosqlite:///./test.db
          REDIS_URL: redis://localhost:6379/0
          SECRET_KEY: benchmark-secret-key
        continue-on-error: true

      - name: Upload benchmark results
        uses: actions/upload-artifact@v4
        with:
          name: python-benchmark-results
          path: .benchmarks/
          retention-days: 30

      - name: Store benchmark result
        uses: benchmark-action/github-action-benchmark@v1
        if: github.ref == 'refs/heads/main'
        with:
          tool: 'pytest'
          output-file-path: benchmark-results.json
          benchmark-data-dir-path: benchmarks/python
          github-token: ${{ secrets.GITHUB_TOKEN }}
          auto-push: false
          alert-threshold: '150%'
          comment-on-alert: true
          fail-on-alert: true

  # ==================== Rust 性能测试 ====================
  rust-benchmark:
    name: Rust Benchmarks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust -> target

      - name: Run Rust benchmarks
        run: cargo bench --workspace -- --save-baseline main
        working-directory: rust
        continue-on-error: true

      - name: Generate benchmark report
        run: |
          cargo bench --workspace -- --noplot 2>&1 | tee rust-benchmark-output.txt
        working-directory: rust
        continue-on-error: true

      - name: Upload benchmark results
        uses: actions/upload-artifact@v4
        with:
          name: rust-benchmark-results
          path: |
            rust/target/criterion/
            rust/rust-benchmark-output.txt
          retention-days: 30

  # ==================== 前端 Lighthouse 测试 ====================
  lighthouse:
    name: Lighthouse CI
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 9

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
          cache-dependency-path: src/frontend/pnpm-lock.yaml

      - name: Install dependencies
        working-directory: src/frontend
        run: pnpm install --frozen-lockfile

      - name: Build frontend
        working-directory: src/frontend
        run: pnpm run build

      - name: Install Lighthouse CI
        run: npm install -g @lhci/cli@0.14.x

      - name: Create Lighthouse config
        run: |
          mkdir -p .lighthouse
          cat > .lighthouse/lighthouserc.json << 'EOF'
          {
            "ci": {
              "collect": {
                "numberOfRuns": 3,
                "startServerCommand": "pnpm --filter frontend preview --port 4173",
                "url": ["http://localhost:4173/"],
                "settings": {
                  "preset": "desktop",
                  "throttling": {
                    "rttMs": 40,
                    "throughputKbps": 10240,
                    "cpuSlowdownMultiplier": 1
                  }
                }
              },
              "assert": {
                "preset": "lighthouse:recommended",
                "assertions": {
                  "categories:performance": ["error", {"minScore": 0.8}],
                  "categories:accessibility": ["error", {"minScore": 0.9}],
                  "categories:best-practices": ["error", {"minScore": 0.8}],
                  "categories:seo": ["error", {"minScore": 0.8}]
                }
              },
              "upload": {
                "target": "temporary-public-storage"
              }
            }
          }
          EOF

      - name: Run Lighthouse CI
        run: lhci autorun
        continue-on-error: true

      - name: Upload Lighthouse results
        uses: actions/upload-artifact@v4
        with:
          name: lighthouse-results
          path: .lighthouseci/
          retention-days: 30

  # ==================== 性能报告汇总 ====================
  benchmark-summary:
    name: Benchmark Summary
    runs-on: ubuntu-latest
    needs: [python-benchmark, rust-benchmark, lighthouse]
    if: always()

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: results/

      - name: Create summary
        run: |
          echo "# Performance Benchmark Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Test Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Component | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Python Benchmarks | ${{ needs.python-benchmark.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Rust Benchmarks | ${{ needs.rust-benchmark.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Lighthouse CI | ${{ needs.lighthouse.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Artifacts have been uploaded for detailed analysis." >> $GITHUB_STEP_SUMMARY