# Cross-Platform Package Builder
# Creates standalone executables and installers for:
# - Windows: .exe installer (NSIS)
# - Linux: .deb, .rpm, .AppImage
#
# Triggered manually or alongside release tags
#
# References:
# - PyInstaller: https://pyinstaller.org/
# - FPM: https://github.com/jordansissel/fpm
# - AppImage: https://appimage.org/
# - NSIS: https://nsis.sourceforge.io/

name: Build Packages

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version (e.g., 0.2.0)'
        required: true
        default: '0.2.0'
      upload_to_release:
        description: 'Upload to GitHub Release'
        type: boolean
        default: true
  push:
    tags:
      - 'v*'

permissions:
  contents: write  # for creating releases

env:
  PYTHON_VERSION: '3.12'
  NODE_VERSION: '20'
  RUST_VERSION: 'stable'

jobs:
  # ============================================
  # BUILD COMPONENTS (Parallel)
  # ============================================
  
  build-rust:
    name: Build Rust Extensions
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v6
      
      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_VERSION }}
          targets: x86_64-unknown-linux-gnu
      
      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust/
      
      - name: Build Rust extensions
        run: |
          cd rust/
          cargo build --release --target x86_64-unknown-linux-gnu
      
      - name: Upload Rust artifacts
        uses: actions/upload-artifact@v4
        with:
          name: rust-extensions
          path: rust/target/release/

  build-frontend:
    name: Build Frontend
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v6
      
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      
      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10
      
      - name: Install dependencies
        run: |
          cd src/frontend/
          pnpm install --frozen-lockfile
      
      - name: Build frontend
        run: |
          cd src/frontend/
          pnpm build
      
      - name: Upload frontend artifacts
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: src/frontend/dist/

  build-python-bundle:
    name: Build Python Bundle
    runs-on: ubuntu-latest
    needs: [build-rust, build-frontend]
    
    steps:
      - uses: actions/checkout@v6
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      
      - name: Download Rust extensions
        uses: actions/download-artifact@v4
        with:
          name: rust-extensions
          path: rust_lib/
      
      - name: Download frontend
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: src/frontend/dist/
      
      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          pip install -e ".[dev]"
      
      - name: Install Rust extension
        run: |
          # Copy built Rust extension to site-packages
          cp rust_lib/*.so $(python -c "import site; print(site.getsitepackages()[0])")/
      
      - name: Build with PyInstaller
        run: |
          cd packaging/
          pyinstaller bioworkflow.spec --noconfirm
          cp -r dist/bioworkflow ../dist/bundle-linux/
      
      - name: Upload Python bundle
        uses: actions/upload-artifact@v4
        with:
          name: bundle-linux
          path: dist/bundle-linux/

  # ============================================
  # LINUX PACKAGES (Parallel)
  # ============================================
  
  package-linux-deb:
    name: Build DEB Package
    runs-on: ubuntu-latest
    needs: build-python-bundle
    
    steps:
      - uses: actions/checkout@v6
      
      - name: Download bundle
        uses: actions/download-artifact@v4
        with:
          name: bundle-linux
          path: dist/bioworkflow/
      
      - name: Install FPM
        run: sudo gem install fpm
      
      - name: Build DEB package
        run: |
          # Extract version
          VERSION=${{ github.event.inputs.version || github.ref_name }}
          VERSION=${VERSION#v}
          
          # Create package structure
          mkdir -p .debpkg/usr/bin
          mkdir -p .debpkg/usr/lib/bioworkflow
          mkdir -p .debpkg/etc/bioworkflow
          
          cp dist/bioworkflow/bioworkflow .debpkg/usr/bin/
          cp -r dist/bioworkflow/* .debpkg/usr/lib/bioworkflow/
          
          # Build DEB
          fpm -s dir -t deb \
            -n bioworkflow \
            -v "$VERSION" \
            --description "BioWorkflow - Bioinformatics workflow platform" \
            --maintainer "BioWorkflow Team <team@bioworkflow.org>" \
            --url "https://github.com/${{ github.repository }}" \
            --license "MIT" \
            --vendor "BioWorkflow" \
            --deb-pre-depends "python3 (>= 3.10)" \
            --deb-pre-depends "libglib2.0-0" \
            --deb-systemd .github/workflows/bioworkflow.service \
            --after-install packaging/linux/postinst.sh \
            --before-remove packaging/linux/prerm.sh \
            .debpkg/=/
          
          # Rename package
          mv bioworkflow*.deb bioworkflow_${VERSION}_amd64.deb
      
      - name: Upload DEB package
        uses: actions/upload-artifact@v4
        with:
          name: deb-package
          path: "*.deb"
  
  package-linux-rpm:
    name: Build RPM Package
    runs-on: ubuntu-latest
    needs: build-python-bundle
    container: rockylinux:9
    
    steps:
      - uses: actions/checkout@v6
      
      - name: Download bundle
        uses: actions/download-artifact@v4
        with:
          name: bundle-linux
          path: dist/bioworkflow/
      
      - name: Install build dependencies
        run: |
          dnf install -y ruby ruby-devel gcc make
          gem install fpm
      
      - name: Build RPM package
        run: |
          VERSION=${{ github.event.inputs.version || github.ref_name }}
          VERSION=${VERSION#v}
          
          mkdir -p .rpmpkg/usr/bin
          mkdir -p .rpmpkg/usr/lib/bioworkflow
          mkdir -p .rpmpkg/etc/bioworkflow
          
          cp dist/bioworkflow/bioworkflow .rpmpkg/usr/bin/
          cp -r dist/bioworkflow/* .rpmpkg/usr/lib/bioworkflow/
          
          fpm -s dir -t rpm \
            -n bioworkflow \
            -v "$VERSION" \
            --description "BioWorkflow - Bioinformatics workflow platform" \
            --maintainer "BioWorkflow Team <team@bioworkflow.org>" \
            --url "https://github.com/${{ github.repository }}" \
            --license "MIT" \
            --vendor "BioWorkflow" \
            --rpm-os linux \
            --rpm-autoreqprov \
            .rpmpkg/=/
          
          mv bioworkflow*.rpm bioworkflow-${VERSION}.x86_64.rpm
      
      - name: Upload RPM package
        uses: actions/upload-artifact@v4
        with:
          name: rpm-package
          path: "*.rpm"
  
  package-linux-appimage:
    name: Build AppImage
    runs-on: ubuntu-latest
    needs: build-python-bundle
    
    steps:
      - uses: actions/checkout@v6
      
      - name: Download bundle
        uses: actions/download-artifact@v4
        with:
          name: bundle-linux
          path: dist/bioworkflow/
      
      - name: Install AppImage tools
        run: |
          wget https://github.com/AppImage/appimagetool/releases/download/continuous/appimagetool-x86_64.AppImage
          chmod +x appimagetool-x86_64.AppImage
          sudo mv appimagetool-x86_64.AppImage /usr/local/bin/appimagetool
      
      - name: Create AppDir
        run: |
          mkdir -p AppDir/usr/bin
          mkdir -p AppDir/usr/share/icons/hicolor/256x256/apps
          mkdir -p AppDir/usr/share/applications
          
          # Copy application
          cp dist/bioworkflow/bioworkflow AppDir/usr/bin/
          cp -r dist/bioworkflow/* AppDir/usr/lib/bioworkflow/
          
          # Create wrapper script
          cat > AppDir/AppRun << 'EOF'
          #!/bin/bash
          SELF=$(readlink -f "$0")
          HERE=${SELF%/AppRun}
          export PATH="${HERE}/usr/bin:${PATH}"
          export PYTHONPATH="${HERE}/usr/lib/bioworkflow"
          exec "${HERE}/usr/bin/bioworkflow" "$@"
          EOF
          chmod +x AppDir/AppRun
          
          # Create desktop file
          cat > AppDir/usr/share/applications/bioworkflow.desktop << 'EOF'
          [Desktop Entry]
          Type=Application
          Name=BioWorkflow
          Comment=Bioinformatics workflow platform
          Icon=bioworkflow
          Exec=bioworkflow %F
          Terminal=false
          Categories=Science;Education;
          EOF
          
          # Create icon (placeholder)
          echo "Create icon file"
          touch AppDir/usr/share/icons/hicolor/256x256/apps/bioworkflow.png
      
      - name: Build AppImage
        run: |
          VERSION=${{ github.event.inputs.version || github.ref_name }}
          VERSION=${VERSION#v}
          
          appimagetool AppDir \
            -u "gh-releases-zsync|${{ github.repository_owner }}|bioworkflow|latest|*x86_64.AppImage.zsync" \
            bioworkflow-${VERSION}-x86_64.AppImage
      
      - name: Upload AppImage
        uses: actions/upload-artifact@v4
        with:
          name: appimage
          path: "*.AppImage"

  # ============================================
  # WINDOWS PACKAGE
  # ============================================
  
  package-windows:
    name: Build Windows Installer
    runs-on: windows-latest
    needs: [build-rust, build-frontend]
    
    steps:
      - uses: actions/checkout@v6
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          architecture: x64
      
      - name: Download Rust extensions
        uses: actions/download-artifact@v4
        with:
          name: rust-extensions
          path: rust_lib/
      
      - name: Download frontend
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: src/frontend/dist/
      
      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          pip install -e ".[dev]"
      
      - name: Install Rust extension
        run: |
          # Copy built Rust extension (.pyd file)
          cp rust_lib/*.pyd $(python -c "import site; print(site.getsitepackages()[0])")/
      
      - name: Build with PyInstaller
        run: |
          cd packaging/
          pyinstaller bioworkflow.spec --noconfirm
          cp -r dist/bioworkflow ../dist/bundle-windows/
      
      - name: Install NSIS
        run: choco install nsis -y
      
      - name: Build NSIS installer
        run: |
          # Extract version
          $VERSION = "${{ github.event.inputs.version || github.ref_name }}".TrimStart('v')
          
          # Create installer script
          $installerScript = @"
          !define VERSION "$VERSION"
          !define PRODUCT_NAME "BioWorkflow"
          !define COMPANY_NAME "BioWorkflow Team"
          !define PRODUCT_WEB_SITE "https://github.com/${{ github.repository }}"
          
          Unicode True
          
          Name "${PRODUCT_NAME} v${VERSION}"
          OutFile "bioworkflow-${VERSION}-windows-x64-installer.exe"
          
          InstallDir "$PROGRAMFILES\BioWorkflow"
          InstallDirRegKey HKLM "Software\BioWorkflow" ""
          
          RequestExecutionLevel admin
          
          Page components
          Page directory
          Page instfiles
          
          UninstPage uninstConfirm
          UninstPage instfiles
          
          Section "BioWorkflow (required)"
            SectionIn RO
            SetOutPath "$INSTDIR"
            File /r "dist\bundle-windows\*.*"
            WriteRegStr HKLM "Software\BioWorkflow" "" "$INSTDIR"
            WriteUninstaller "$INSTDIR\uninstall.exe"
          SectionEnd
          
          Section "Desktop Shortcut"
            CreateShortcut "$DESKTOP\BioWorkflow.lnk" "$INSTDIR\bioworkflow.exe"
          SectionEnd
          
          Section "Start Menu Shortcuts"
            CreateDirectory "$SMPROGRAMS\BioWorkflow"
            CreateShortcut "$SMPROGRAMS\BioWorkflow\BioWorkflow.lnk" "$INSTDIR\bioworkflow.exe"
            CreateShortcut "$SMPROGRAMS\BioWorkflow\Uninstall.lnk" "$INSTDIR\uninstall.exe"
          SectionEnd
          
          Section "Uninstall"
            RMDir /r "$INSTDIR"
            RMDir /r "$SMPROGRAMS\BioWorkflow"
            Delete "$DESKTOP\BioWorkflow.lnk"
            DeleteRegKey /ifempty HKLM "Software\BioWorkflow"
          SectionEnd
          "@
          
          # Write installer script
          Set-Content -Path "installer.nsi" -Value $installerScript
          
          # Build installer
          & "C:\Program Files (x86)\NSIS\makensis.exe" installer.nsi
      
      - name: Upload Windows installer
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: "*.exe"

  # ============================================
  # PACKAGE TESTS
  # ============================================
  
  test-packages:
    name: Test Package Installation
    runs-on: ubuntu-latest
    needs: [package-linux-deb, package-linux-rpm, package-linux-appimage, package-windows]
    
    steps:
      - uses: actions/checkout@v6
      
      - name: Download all packages
        uses: actions/download-artifact@v4
        with:
          pattern: "*-package"
          path: packages/
          merge-multiple: true
      
      - name: Test DEB installation
        run: |
          sudo apt install ./packages/*.deb -y
          bioworkflow --version || echo "DEB test completed"
      
      - name: Test AppImage execution
        run: |
          chmod +x packages/*.AppImage
          ./packages/*.AppImage --version || echo "AppImage test completed"

  # ============================================
  # RELEASE
  # ============================================
  
  create-release:
    name: Upload to GitHub Release
    runs-on: ubuntu-latest
    needs: [test-packages]
    if: github.event_name == 'push' || github.event.inputs.upload_to_release == 'true'
    
    steps:
      - uses: actions/checkout@v6
      
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: "*"
          path: artifacts/
          merge-multiple: true
      
      - name: Extract version from tag
        id: version
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          echo "version=$VERSION" >> $GITHUB_OUTPUT
      
      - name: Create/Update Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/*.deb
            artifacts/*.rpm
            artifacts/*.AppImage
            artifacts/*.exe
          generate_release_notes: true
          tag_name: v${{ steps.version.outputs.version }}
