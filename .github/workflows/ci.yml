# Main CI Pipeline for Python + Rust + Vue Full-Stack Project
# Runs on every push and pull request to main/develop branches
# 
# Reference:
# - GitHub Actions: https://github.com/actions
# - Maturin for Python+Rust: https://github.com/PyO3/maturin
# - Vite for Vue: https://vite.dev

name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

# Cancel in-progress runs for the same branch
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: '3.12'
  NODE_VERSION: '22'
  RUST_VERSION: '1.85'
  PNPM_VERSION: '10'

jobs:
  # ============================================
  # QUALITY CHECKS - Fast feedback
  # ============================================
  
  lint-python:
    name: Lint Python
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
          cache-dependency-path: |
            **/pyproject.toml
            **/requirements*.txt
      
      - name: Install linters
        run: pip install ruff black isort mypy
      
      - name: Run Ruff
        run: ruff check src/backend/ tests/
      
      - name: Run Black
        run: black --check src/backend/ tests/
      
      - name: Run isort
        run: isort --check-only src/backend/ tests/
      
      - name: Run mypy
        run: mypy src/backend/

  lint-rust:
    name: Lint Rust
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      
      - name: Install Rust
        uses: actions-rs/toolchain@v1
        with:
          toolchain: ${{ env.RUST_VERSION }}
          profile: minimal
          components: rustfmt, clippy
          override: true
      
      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: './rust -> target'
      
      - name: Run rustfmt
        run: cargo fmt --all -- --check
        working-directory: rust/
      
      - name: Run clippy
        run: cargo clippy --all-targets --all-features -- -D warnings
        working-directory: rust/

  lint-frontend:
    name: Lint Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      
      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
          cache-dependency-path: 'src/frontend/pnpm-lock.yaml'
      
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        working-directory: src/frontend/
      
      - name: Run ESLint
        run: pnpm lint
        working-directory: src/frontend/
      
      - name: Run TypeScript check
        run: pnpm type-check
        working-directory: src/frontend/

  # ============================================
  # TESTS - Parallel execution
  # ============================================
  
  test-python:
    name: Test Python
    runs-on: ubuntu-latest
    needs: [lint-python]
    
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.11', '3.12', '3.13']
    
    steps:
      - uses: actions/checkout@v6
      
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      
      - name: Run tests with coverage
        run: pytest tests/ -v --cov=src/backend --cov-report=xml --cov-report=html
      
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage.xml
          flags: python
          name: python-${{ matrix.python-version }}

  test-rust:
    name: Test Rust
    runs-on: ${{ matrix.os }}
    needs: [lint-rust]
    
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        rust: [stable, beta]
    
    steps:
      - uses: actions/checkout@v6
      
      - name: Install Rust ${{ matrix.rust }}
        uses: actions-rs/toolchain@v1
        with:
          toolchain: ${{ matrix.rust }}
          profile: minimal
          override: true
      
      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: './rust -> target'
      
      - name: Run tests
        run: cargo test --all-features --release
        working-directory: rust/

  test-frontend:
    name: Test Frontend
    runs-on: ubuntu-latest
    needs: [lint-frontend]
    
    steps:
      - uses: actions/checkout@v6
      
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      
      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
          cache-dependency-path: 'src/frontend/pnpm-lock.yaml'
      
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        working-directory: src/frontend/
      
      - name: Run unit tests
        run: pnpm test:unit
        working-directory: src/frontend/
      
      - name: Run E2E tests
        run: pnpm test:e2e
        working-directory: src/frontend/

  # ============================================
  # BUILD - Artifacts for deployment
  # ============================================
  
  build-rust-wheels:
    name: Build Rust Wheels
    needs: [test-rust]
    
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux
          - os: ubuntu-latest
            target: x86_64
            platform: manylinux
          - os: ubuntu-latest
            target: aarch64
            platform: manylinux
          # macOS
          - os: macos-latest
            target: x86_64
            platform: macos
          - os: macos-latest
            target: aarch64
            platform: macos
          # Windows
          - os: windows-latest
            target: x64
            platform: windows
    
    runs-on: ${{ matrix.os }}
    
    steps:
      - uses: actions/checkout@v6
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      
      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          args: --release --out dist
          manylinux: auto
          sccache: ${{ !startsWith(github.ref, 'refs/tags/') }}
      
      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.platform }}-${{ matrix.target }}
          path: dist/

  build-frontend:
    name: Build Frontend
    runs-on: ubuntu-latest
    needs: [test-frontend]
    
    steps:
      - uses: actions/checkout@v6
      
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      
      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
          cache-dependency-path: 'src/frontend/pnpm-lock.yaml'
      
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        working-directory: src/frontend/
      
      - name: Build
        run: pnpm build
        working-directory: src/frontend/
        env:
          NODE_ENV: production
      
      - name: Upload build
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: src/frontend/dist/

  # ============================================
  # SECURITY - Code scanning
  # ============================================
  
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    
    steps:
      - uses: actions/checkout@v6
      
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: python, javascript, rust
      
      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: '/language:multi'
      
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'
      
      - name: Upload Trivy scan results
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: 'trivy-results.sarif'

  # ============================================
  # INTEGRATION - Docker build test
  # ============================================
  
  docker-build:
    name: Docker Build Test
    runs-on: ubuntu-latest
    needs: [build-rust-wheels, build-frontend]
    
    steps:
      - uses: actions/checkout@v6
      
      - name: Download wheels
        uses: actions/download-artifact@v4
        with:
          pattern: wheels-*
          path: dist/
          merge-multiple: true
      
      - name: Download frontend
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: src/frontend/dist/
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: ${{ github.repository }}:test
          cache-from: type=gha
          cache-to: type=gha,mode=max