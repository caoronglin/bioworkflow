site_name: BioWorkflow 文档
site_description: BioWorkflow - 生物信息学工作流管理平台文档
site_author: BioWorkflow Team
site_url: https://yourusername.github.io/bioworkflow/

docs_dir: docs
site_dir: site

# 主题配置
theme:
  name: material
  language: zh
  palette:
    # 浅色模式
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: blue
      accent: blue
      toggle:
        icon: material/brightness-7
        name: 切换到深色模式
    # 深色模式
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: blue
      accent: blue
      toggle:
        icon: material/brightness-4
        name: 切换到浅色模式
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.footer
    - search.suggest
    - search.highlight
    - content.tabs.link
    - content.code.annotate
    - content.code.copy
  icon:
    admonition:
      note: octicons/tag-16
      abstract: octicons/checklist-16
      info: octicons/info-16
      tip: octicons/squirrel-16
      success: octicons/check-16
      question: octicons/question-16
      warning: octicons/alert-16
      failure: octicons/x-16
      danger: octicons/zap-16
      bug: octicons/bug-16
      example: octicons/beaker-16
      quote: octicons/quote-16

# 插件配置
plugins:
  - search:
      lang: zh
  - minify:
      minify_html: true

# 额外配置
extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/yourusername/bioworkflow
      name: GitHub
    - icon: fontawesome/brands/docker
      link: https://hub.docker.com/r/yourusername/bioworkflow
      name: Docker Hub
  version:
    provider: mike
  analytics:
    feedback:
      title: 此页面有帮助吗？
      ratings:
        - icon: material/heart
          name: 非常有用
          data: 1
          note: 感谢您的反馈！
        - icon: material/heart-broken
          name: 需要改进
          data: 0
          note: 感谢您的反馈！我们会持续改进。

# 扩展
markdown_extensions:
  - abbr
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - toc:
      permalink: true
      title: 目录
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.betterem:
      smart_enable: all
  - pymdownx.caret
  - pymdownx.details
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.keys
  - pymdownx.magiclink:
      repo_url_shorthand: true
      user: yourusername
      repo: bioworkflow
  - pymdownx.mark
  - pymdownx.smartsymbols
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.tilde

# 导航配置
nav:
  - Home: index.md
  - Getting Started:
    - Installation: guide/installation.md
    - Quickstart: guide/quickstart.md
    - Configuration: guide/configuration.md
  - User Guide:
    - Workflows: guide/workflows.md
    - Conda: guide/conda.md
    - Knowledge Base: guide/knowledge.md
    - MCP Services: guide/mcp.md
  - Deployment:
    - Docker: deployment/docker.md
    - Production: deployment/production.md
  - Development:
    - Architecture: development/architecture.md
    - Contributing: development/contributing.md
    - Plugin Guide: development/plugins.md
  - API Reference:
    - Overview: api/index.md
    - Endpoints: api/endpoints.md
  - Reference:
    - Environment: reference/environment.md
    - FAQ: reference/faq.md
  - Architecture:
    - Overview: architecture/overview.md
